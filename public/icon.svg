<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="55%" stop-color="#e11d74"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#ffe4e6" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Lotus petals (women's health motif) -->
  <g transform="translate(256 256)">
    <g>
      <path d="M0,-150 C40,-110 40,-40 0,0 C-40,-40 -40,-110 0,-150 Z" fill="url(#petal)" opacity="0.95"/>
      <path d="M0,-150 C40,-110 40,-40 0,0 C-40,-40 -40,-110 0,-150 Z" fill="url(#petal)" opacity="0.9" transform="rotate(60)"/>
      <path d="M0,-150 C40,-110 40,-40 0,0 C-40,-40 -40,-110 0,-150 Z" fill="url(#petal)" opacity="0.85" transform="rotate(120)"/>
      <path d="M0,-150 C40,-110 40,-40 0,0 C-40,-40 -40,-110 0,-150 Z" fill="url(#petal)" opacity="0.9" transform="rotate(180)"/>
      <path d="M0,-150 C40,-110 40,-40 0,0 C-40,-40 -40,-110 0,-150 Z" fill="url(#petal)" opacity="0.85" transform="rotate(240)"/>
      <path d="M0,-150 C40,-110 40,-40 0,0 C-40,-40 -40,-110 0,-150 Z" fill="url(#petal)" opacity="0.95" transform="rotate(300)"/>
    </g>
    <circle r="42" fill="url(#core)"/>
    <text x="0" y="14" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#7c2d12" text-anchor="middle">A</text>
  </g>
</svg>
